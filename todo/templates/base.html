{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Dashboard{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
    /* Sidebar */
    .sidebar {
        width: 60px;
        height: 100vh;
        background-color: #1f1f2e;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 20px;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 1000;
    }
    .sidebar a {
        color: white;
        text-decoration: none;
        margin-bottom: 25px;
        display: flex;
        justify-content: center;
        width: 100%;
        transition: all 0.2s;
    }
    .sidebar a:hover {
        color: #0d6efd;
        transform: scale(1.2);
    }

    /* Page content */
    .content {
        margin-left: 60px; /* space for sidebar */
        padding: 20px;
    }
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body>

<!-- Sidebar -->
<div class="sidebar d-flex flex-column align-items-center">
    <!-- Home / Dashboard -->
    <a href="{% url 'dashboard' %}" title="Home">
        <i class="bi bi-house-door fs-4"></i>
    </a>

    <!-- Notes -->
    <a href="{% url 'notes' %}" title="Notes">
        <i class="bi bi-journal-text fs-4"></i>
    </a>

    <!-- Expenses Tracker -->
    <a href="{% url 'expense_tracker' %}" title="Expenses">
        <i class="bi bi-wallet2 fs-4"></i>
    </a>

    <!-- Password Manager -->
    <a href="{% url 'password_page' %}" title="Passwords">
        <i class="bi bi-shield-lock fs-4"></i>
    </a>

    <!-- Daily Journal -->
    <a href="{% url 'journal' %}" title="Journal">
        <i class="bi bi-book fs-4"></i> <!-- journal/book icon -->
    </a>
</div>

<!-- Main content -->
<div class="content">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
